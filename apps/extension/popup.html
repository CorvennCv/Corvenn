<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #14B8A6;
      --primary-hover: #096961;
      --background: #F8FAFC;
      --card: #FFFFFF;
      --border: hsl(200, 14%, 92%);
      /* matched to --muted */
      --foreground: hsl(210, 30%, 10%);
      --muted: hsl(210, 16%, 44%);
      --muted-bg: hsl(200, 14%, 92%);
      --success: #10B981;
      --warning: hsl(38, 92%, 50%);
      --destructive: hsl(0, 84%, 60%);
      --radius-sm: 0.375rem;
      --radius: 0.5rem;
      --radius-lg: 0.75rem;
    }

    body {
      font-family: 'Inter', sans-serif;
      width: 360px;
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      height: 540px;
    }

    * {
      box-sizing: border-box;
    }

    /* Header */
    .header {
      background: var(--card);
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header svg {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }

    .header h2 {
      margin: 0;
      font-size: 18px;
      font-weight: 800;
    }

    /* Tabs */
    .main-tabs {
      display: flex;
      background: var(--card);
      border-bottom: 1px solid var(--border);
    }

    .main-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .main-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }

    .main-tab:hover:not(.active) {
      color: var(--foreground);
      background: var(--muted-bg);
    }

    .content-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      position: relative;
    }

    .view-panel {
      display: none;
    }

    .view-panel.active {
      display: block;
    }

    .hidden {
      display: none !important;
    }

    /* Forms */
    .form-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--foreground);
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 13px;
      background: var(--card);
      transition: border-color 0.2s;
    }

    input:focus,
    textarea:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(20, 184, 166, 0.1);
    }

    textarea {
      resize: vertical;
      min-height: 70px;
    }

    /* Buttons */
    .btn {
      background: var(--primary);
      color: white;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: var(--radius);
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover {
      background: var(--primary-hover);
    }

    .btn:disabled {
      background: var(--muted);
      cursor: not-allowed;
      opacity: 0.7;
    }

    .btn-secondary {
      background: var(--card);
      color: var(--foreground);
      border: 1px solid var(--border);
    }

    .btn-secondary:hover {
      background: var(--muted-bg);
    }

    /* Alerts / Status */
    .alert {
      padding: 12px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .alert-error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--destructive);
    }

    .alert-success {
      background: #ecfdf5;
      border: 1px solid #a7f3d0;
      color: var(--success);
    }

    .alert-info {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: var(--primary);
    }

    /* Resumes List */
    .resume-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      margin-bottom: 12px;
      transition: all 0.2s;
    }

    .resume-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .resume-title {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .resume-meta {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 10px;
    }



    /* Loading Spinner */
    .spinner {
      border: 3px solid rgba(20, 184, 166, 0.1);
      border-radius: 50%;
      border-top: 3px solid var(--primary);
      width: 16px;
      height: 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-overlay {
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.8);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      gap: 10px;
      font-size: 13px;
      font-weight: 500;
      color: var(--primary);
    }
  </style>
</head>

<body>

  <!-- Header -->
  <div class="header">
    <img src="logo.png" alt="Corvenn" style="width: 5rem; ">
  </div>

  <!-- Update Banner -->
  <div id="update-banner" class="hidden"
    style="background: var(--primary); color: white; padding: 12px; font-size: 13px; border-bottom: 1px solid var(--primary-hover);">
    <div style="font-weight: 700; margin-bottom: 4px;">Update Available!</div>
    <div id="update-notes" style="margin-bottom: 8px; font-size: 12px; opacity: 0.9;"></div>
    <button id="update-btn" class="btn"
      style="background: white; color: var(--primary); padding: 8px; font-size: 12px;">Update Extension</button>
  </div>

  <!-- Init Loading Screen (shown while checking auth) -->
  <div id="init-loading"
    style="position:absolute; inset:0; background:var(--background); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; z-index:100;">
    <img src="logo.png" alt="Corvenn" style="width:6rem; opacity:0.8;">
    <div style="display:flex; align-items:center; gap:8px; color:var(--muted); font-size:13px; font-weight:500;">
      <div class="spinner"></div>
      Connecting...
    </div>
  </div>

  <!-- Main App View -->
  <div id="app-view" class="hidden">
    <!-- Main Tabs -->
    <div class="main-tabs">
      <div id="nav-tracker" class="main-tab active">Job Tracker</div>
      <div id="nav-resumes" class="main-tab">My Resumes</div>
    </div>

    <!-- Scrollable Content Area -->
    <div class="content-area">

      <!-- Status Messages -->
      <div id="status-msg" class="alert hidden"></div>

      <!-- Overlay Loader -->
      <div id="loading-overlay" class="loading-overlay hidden">
        <div class="spinner"></div>
        <span id="loading-text">Processing...</span>
      </div>

      <!-- Tracker Panel -->
      <div id="panel-tracker" class="view-panel active">
        <div id="auto-info" class="alert alert-info" style="font-size:11px; padding:8px; margin-bottom: 16px;">
          Extracting details from the current page...
        </div>

        <div class="form-group">
          <label>Company</label>
          <input type="text" id="company" placeholder="e.g. Google" />
        </div>
        <div class="form-group">
          <label>Position</label>
          <input type="text" id="position" placeholder="e.g. Senior Software Engineer" />
        </div>
        <div class="form-group">
          <label>Tracker Column Status</label>
          <select id="status-select">
            <option value="wishlist">Wishlist (Default)</option>
            <option value="applied">Applied</option>
            <option value="oa">OA / Test</option>
            <option value="interview">Interview</option>
            <option value="offer">Offer</option>
            <option value="rejected">Rejected</option>
          </select>
        </div>
        <div class="form-group" style="display:flex; gap:10px;">
          <div style="flex:1;">
            <label>Location</label>
            <input type="text" id="location" placeholder="e.g. Remote" />
          </div>
          <div style="flex:1;">
            <label>Salary</label>
            <input type="text" id="salary" placeholder="e.g. $120k" />
          </div>
        </div>
        <div class="form-group">
          <label>Notes</label>
          <textarea id="notes" placeholder="Optional context, recruiter name, referrals..."></textarea>
        </div>

        <button id="save-btn" class="btn">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
            <polyline points="17 21 17 13 7 13 7 21"></polyline>
            <polyline points="7 3 7 8 15 8"></polyline>
          </svg>
          Save to Kanban Board
        </button>
      </div>

      <!-- Resumes Panel -->
      <div id="panel-resumes" class="view-panel">

        <div id="resumes-list">
          <!-- Dynamically populated -->
          <div class="text-center" style="font-size:12px; color:var(--muted); padding:20px 0;">Loading resumes...</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Auth View (shown when not signed in) -->
  <div id="auth-view" class="hidden"
    style="padding: 0 20px 30px; text-align: center; flex:1; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:0;">
    <img src="logo.png" alt="Corvenn" style="width:7rem; margin-bottom:20px;">
    <p style="font-size:13px; color:var(--muted); line-height:1.6; margin:0 0 24px 0; max-width:240px;">
      Sign in to Corvenn to save jobs and auto-fill applications.
    </p>
    <button id="login-btn" class="btn" style="max-width:220px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
      Sign in to Corvenn
    </button>
    <p id="auth-waiting" class="hidden" style="font-size:11px; color:var(--muted); margin-top:14px; line-height:1.5;">
      Waiting for sign in...
    </p>
  </div>

  <script src="config.js"></script>
  <script src="popup.js"></script>
</body>

</html>
